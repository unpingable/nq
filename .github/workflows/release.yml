name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            arch: amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (per rust-toolchain.toml)
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup target add ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y -qq gcc-aarch64-linux-gnu
            echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          for bin in nq-monitor nq-witness; do
            artifact="${bin}-linux-${{ matrix.arch }}"
            cp "target/${{ matrix.target }}/release/${bin}" "${artifact}"
            sha256sum "${artifact}" > "${artifact}.sha256"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-${{ matrix.arch }}
          path: |
            nq-monitor-linux-${{ matrix.arch }}
            nq-monitor-linux-${{ matrix.arch }}.sha256
            nq-witness-linux-${{ matrix.arch }}
            nq-witness-linux-${{ matrix.arch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nq-monitor-linux-amd64
            nq-monitor-linux-amd64.sha256
            nq-monitor-linux-arm64
            nq-monitor-linux-arm64.sha256
            nq-witness-linux-amd64
            nq-witness-linux-amd64.sha256
            nq-witness-linux-arm64
            nq-witness-linux-arm64.sha256
          generate_release_notes: true
