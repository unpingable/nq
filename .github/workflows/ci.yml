name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (per rust-toolchain.toml)
        run: rustup show active-toolchain || rustup toolchain install
      - run: cargo test --all --locked

  gap-status-discipline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check_gap_status.sh

  receipt-reattestation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (per rust-toolchain.toml)
        run: rustup show active-toolchain || rustup toolchain install
      - name: Build nq-monitor
        run: cargo build --release -p nq-monitor --locked
      - name: Re-attest committed nq.receipt.v1 specimens (fail-closed)
        run: ./scripts/check-nq-receipts.sh
